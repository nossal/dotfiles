[tools]
usage = "latest"
fzf = "latest" # fuzy finder
jq = "latest" # json processor
yq = "latest" # yaml processor, similar to jq
rg = "latest" # ripgrep, a line-oriented search tool, similar to grep
fd = "latest" # simple, fast and user-friendly alternative to find
lsd = "latest" # modern replacement for ls written in Rust
zoxide = "latest" # smarter cd command, inspired by z and autojump
btop = "latest" # resource monitor
gh = "latest" # GitHub CLI tool
lazygit = "latest" # simple terminal UI for git commands
delta = "latest" # syntax-highlighting pager for git and diff output
gitleaks = "latest" # audit git repos for secrets and sensitive data
trivy = "latest" # vulnerability scanner for containers and other artifacts
kubectl = "latest" # Kubernetes command-line tool
helm = "latest" # The Kubernetes package manager
# --- languages ---
rust = { version = "1.89.0", profile = "default" }
java = "25"
python = "latest"
go = "latest"
deno = "latest"
nodejs = "latest"
opam = "latest"

[settings]
experimental = true

trusted_config_paths = [
  "~/workspace",
  "~/.dotfiles"
]

idiomatic_version_file_enable_tools = ["python"]

[settings.python]
uv_venv_auto = true

[tool_alias.java.versions]
8 = "corretto-8"
11 = "corretto-11"
17 = "corretto-17"
25 = "corretto-25"
lts = "corretto-25"
latest = "corretto-25"
